services:
  - type: web
    name: jacaranda
    runtime: python
    buildCommand: pip install -r requirements.txt && python scripts/init_db.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./jacaranda.db
